name: Build Desktop (reusable)

# 共享构建配方，唯一真源。由 release-windows / release-macos / release-linux 调用。
on:
  workflow_call:
    inputs:
      platform:
        description: 'Runner OS (windows-latest / macos-latest / ubuntu-latest)'
        required: true
        type: string
      args:
        description: 'Extra args passed to tauri-action (e.g. --target aarch64-apple-darwin)'
        required: false
        type: string
        default: ''
      rust-targets:
        description: 'Comma-separated rustup targets to add'
        required: false
        type: string
        default: ''
      tag:
        description: 'Git tag to build and release against (must already exist)'
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # 实验性：Linux 打包所需系统依赖（Tauri v2 / ubuntu-24.04）。首跑若报缺库按日志补。
      - name: Install Linux system dependencies (experimental)
        if: startsWith(inputs.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev \
            libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: 'GeminiOCR ${{ inputs.tag }}'
          releaseBody: 'Desktop OCR release - see commits for details.'
          releaseDraft: true
          prerelease: false
          args: ${{ inputs.args }}
